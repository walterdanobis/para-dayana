<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Para Ti 💙</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- Fondo galaxia -->
    <div id="particles-js"></div>

    <!-- Nebulosas -->
    <div class="nebulosa nebulosa1"></div>

    <div class="nebulosa nebulosa2"></div>

    <!-- Luna -->
    <div class="luna"></div>

    <!-- Planetas -->
    <div class="planeta planeta1"></div>

    <div class="planeta planeta2"></div>

    <!-- Imagen -->
    <img class="anime-girl" src="dayana.jpeg" alt="anime" />

    <!-- Tarjeta -->
    <div class="card">
      <h1>Hola ✨</h1>

      <p>
        Este mensaje no es casual… <br />
        "Dayana, eres una mujer hermosa. Sí, tienes tu genio, eres un poquito
        ñera y grosera cuando te da la gana, pero la verdad es que así,
        completita y con todo ese flow, me encantas. Te estimo muchísimo y me
        gustas tal como eres." <br />
      </p>

      <button onclick="activarMagia()">Presiona aquí 💫</button>
    </div>

    <!-- Música -->
    <audio id="dayana" src="dayana.mp3"></audio>

    <!-- Particles -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <!-- GSAP -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

    <!-- Config partículas -->
    <script src="particles-config.js"></script>

    <!-- Tu JS -->
    <script src="script.js"></script>
  </body>
</html>
